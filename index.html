<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>請求書</title>

  <!-- ライブラリ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body style="font-family: sans-serif; padding:20px;">

  <h2>請求書入力</h2>

  <input id="project" placeholder="工事名"><br><br>
  <input id="vendor" placeholder="業者名"><br><br>
  <input id="amount" placeholder="金額"><br><br>
  <input id="date" type="date"><br><br>

  <button onclick="generatePDF()">PDF生成</button>

  <hr>

  <!-- PDF化する部分 -->
  <div id="invoice" style="padding:20px; border:1px solid #000; width:400px;">
    <h3>請求書</h3>
    <p>工事名：<span id="out_project"></span></p>
    <p>業者名：<span id="out_vendor"></span></p>
    <p>金額：<span id="out_amount"></span>円</p>
    <p>日付：<span id="out_date"></span></p>
  </div>

  <script>
    async function generatePDF() {
      // 入力反映
      document.getElementById("out_project").innerText =
        document.getElementById("project").value;

      document.getElementById("out_vendor").innerText =
        document.getElementById("vendor").value;

      document.getElementById("out_amount").innerText =
        document.getElementById("amount").value;

      document.getElementById("out_date").innerText =
        document.getElementById("date").value;

      const invoice = document.getElementById("invoice");

      const canvas = await html2canvas(invoice);
      const imgData = canvas.toDataURL("image/png");

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.addImage(imgData, "PNG", 10, 10);
      doc.save("invoice.pdf");
    }
  </script>

</body>
</html>
